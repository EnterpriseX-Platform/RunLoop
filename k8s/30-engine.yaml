# runloop-engine — Go scheduler + worker pool (Fiber + gocron).
# Serves /rl/* (REST) and /rl/ws/* (WebSocket). Talks to the same
# Postgres as the web app; the web app's internal API proxies to it
# via the ENGINE_URL env var.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runloop-engine
  namespace: runloop
  labels: { app: runloop-engine }
spec:
  replicas: 1   # single scheduler instance — leader election not implemented
  selector:
    matchLabels: { app: runloop-engine }
  template:
    metadata:
      labels: { app: runloop-engine }
    spec:
      # If pulling from a private registry, create an imagePullSecret in
      # this namespace and uncomment the block below (see
      # docs/deployment/DEPLOYMENT.md step 2.3). Public ghcr.io images
      # don't need it.
      # imagePullSecrets:
      #   - name: runloop-regcred
      containers:
        - name: engine
          image: ghcr.io/enterprisex-platform/runloop-engine:latest
          imagePullPolicy: Always
          ports:
            - { containerPort: 8080, name: http }
          env:
            # Engine reads EXECUTOR_PORT (not PORT) — see
            # apps/runloop-engine/internal/config/config.go
            - name: EXECUTOR_PORT
              value: "8080"
            - name: BASE_PATH
              value: /rl
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: runloop-secret, key: DATABASE_URL }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: runloop-secret, key: JWT_SECRET }
            - name: SECRETS_KEY
              valueFrom:
                secretKeyRef: { name: runloop-secret, key: SECRETS_KEY }
          readinessProbe:
            httpGet: { path: /rl/health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /rl/health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "1000m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: runloop-engine
  namespace: runloop
spec:
  # NodePort — external Apache proxies /runloop/rl → this NodePort.
  # Port is pinned so ops config doesn't break on re-apply.
  type: NodePort
  selector: { app: runloop-engine }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 31157
