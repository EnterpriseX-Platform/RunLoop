# Ingress for community.oneweb.tech → nginx-ingress (class=nginx).
#
# Routes (longest-prefix first — nginx matches in this order):
#   /runloop/rl/ws/*   → runloop-engine:8092   (WebSocket)
#   /runloop/rl/*      → runloop-engine:8092   (engine REST)
#   /runloop/*         → runloop-web:3081      (Next.js, includes /runloop/api/*)
#
# TLS is terminated upstream (external LB / Apache), not at this Ingress.
# If HTTPS termination at ingress is needed, add a `tls:` block with a
# secret referencing a cert for community.oneweb.tech.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: runloop
  namespace: community
  annotations:
    # nginx.org/ingress-controller specific annotations
    nginx.org/proxy-read-timeout: "3600"
    nginx.org/proxy-send-timeout: "3600"
    nginx.org/client-max-body-size: "50m"
    nginx.org/websocket-services: "runloop-engine"
spec:
  ingressClassName: nginx
  rules:
    - host: community.oneweb.tech
      http:
        paths:
          - path: /runloop/rl/ws
            pathType: Prefix
            backend:
              service:
                name: runloop-engine
                port: { number: 8092 }
          - path: /runloop/rl
            pathType: Prefix
            backend:
              service:
                name: runloop-engine
                port: { number: 8092 }
          - path: /runloop
            pathType: Prefix
            backend:
              service:
                name: runloop-web
                port: { number: 3081 }
