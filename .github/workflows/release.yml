name: Release

# Triggered by pushing a tag like v0.1.0. Cross-compiles the Go engine
# + CLI for linux/darwin × amd64/arm64, packages them into tarballs,
# generates SHA256SUMS, and creates a GitHub release.
#
# To cut a release:
#   git tag v0.1.0 && git push --tags

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build engine
        working-directory: apps/runloop-engine
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../../dist
          go build -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o ../../dist/runloop-engine_${{ matrix.goos }}_${{ matrix.goarch }} .

      - name: Build CLI
        working-directory: apps/runloop-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o ../../dist/runloop_${{ matrix.goos }}_${{ matrix.goarch }} .

      - name: Package
        working-directory: dist
        run: |
          tar -czf runloop-engine_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz \
            runloop-engine_${{ matrix.goos }}_${{ matrix.goarch }}
          tar -czf runloop-cli_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz \
            runloop_${{ matrix.goos }}_${{ matrix.goarch }}
          rm runloop-engine_${{ matrix.goos }}_${{ matrix.goarch }} runloop_${{ matrix.goos }}_${{ matrix.goarch }}

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details. Docker images: \`ghcr.io/${{ github.repository_owner }}/runloop-{web,engine}:${{ github.ref_name }}\` (when image-publishing is wired up)." \
            dist/*
