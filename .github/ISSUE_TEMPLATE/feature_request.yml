name: Feature Request
description: Suggest a new node type, queue backend, UI improvement, or capability
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user/operator pain. We design backwards from the problem, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like RunLoop to behave? Sketch the UX or API surface if you have one in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds, other tools, or approaches that don't quite fit.

  - type: checkboxes
    id: contribute
    attributes:
      label: Are you willing to contribute?
      options:
        - label: I'd like to send a PR for this
        - label: I'd like guidance / a pairing session before starting
