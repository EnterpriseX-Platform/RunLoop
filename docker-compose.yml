# RunLoop — single-host Docker Compose deployment.
#
# Quick start:
#   1. cp .env.example .env
#   2. Generate strong secrets:
#        export JWT_SECRET=$(openssl rand -hex 48)
#        export SECRET_ENCRYPTION_KEY=$(openssl rand -hex 32)
#        export POSTGRES_PASSWORD=$(openssl rand -hex 16)
#      Then write them into .env (or `export` them before `docker compose up`).
#   3. docker compose up -d
#
# Compose uses ${VAR:?msg} so it refuses to start if a required env var
# is missing — this prevents accidentally running with weak defaults.

services:
  postgres:
    image: postgres:16-alpine
    container_name: runloop-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-runloop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bind only to localhost — never expose Postgres to the public internet.
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runloop}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - runloop-network
    restart: unless-stopped

  runloop-engine:
    build:
      context: ./apps/runloop-engine
      dockerfile: Dockerfile
    container_name: runloop-engine
    environment:
      EXECUTOR_PORT: 8092
      BASE_PATH: /rl
      DATABASE_URL: postgres://${POSTGRES_USER:-runloop}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-runloop}?sslmode=disable
      WORKER_COUNT: ${WORKER_COUNT:-10}
      WORKER_QUEUE_SIZE: ${WORKER_QUEUE_SIZE:-100}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET (>= 32 chars) in .env}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?set SECRET_ENCRYPTION_KEY (64 hex) in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - runloop-network
    restart: unless-stopped

  runloop:
    build:
      context: ./apps/runloop
      dockerfile: Dockerfile
    container_name: runloop-web
    environment:
      NODE_ENV: production
      PORT: 3081
      DATABASE_URL: postgres://${POSTGRES_USER:-runloop}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-runloop}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY}
      ENGINE_URL: http://runloop-engine:8092
      # SKIP_AUTH must remain unset in production. The auth module hard-fails
      # if it sees SKIP_AUTH=true alongside NODE_ENV=production.
    ports:
      - "3081:3081"
    depends_on:
      postgres:
        condition: service_healthy
      runloop-engine:
        condition: service_started
    networks:
      - runloop-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  runloop-network:
    driver: bridge
